<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a9eda"/>
      <stop offset="50%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </linearGradient>
    <linearGradient id="g2" x1="60" y1="0" x2="160" y2="180" gradientUnits="userSpaceOnUse">
