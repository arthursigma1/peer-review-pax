  <!-- Right eye -->
  <circle cx="126" cy="102" r="7" fill="#1a3a5c"/>
  <!-- Smile -->
  <path d="M78 128 C88 146, 114 146, 126 128" stroke="#1a3a5c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Bottom swoosh -->
